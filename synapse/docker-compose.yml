services:
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: synapse
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:8008:8008"
      - "8448:8448"
    volumes:
      - ./synapse-data:/data
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
      - SYNAPSE_REPORT_STATS=${SYNAPSE_REPORT_STATS}
      - SYNAPSE_CONFIG_PATH=${SYNAPSE_CONFIG_PATH}
      - SYNAPSE_POSTGRES_HOST=${SYNAPSE_POSTGRES_HOST}
      - SYNAPSE_POSTGRES_USER=${SYNAPSE_POSTGRES_USER}
      - SYNAPSE_POSTGRES_PASSWORD=${SYNAPSE_POSTGRES_PASSWORD}
      - SYNAPSE_POSTGRES_DB=${SYNAPSE_POSTGRES_DB}
    networks:
      - matrix-network
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:15-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - matrix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  matrix-network:
    external: true
    name: matrix-network
    driver: bridge