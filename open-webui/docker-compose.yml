  # ============================================
  # OPEN WEBUI SERVICE (CHAT INTERFACE)
  # ============================================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - openwebui-data:/app/backend/data
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_URL=${WEBUI_URL}
      - WEBUI_AUTH=true
      - HF_TOKEN=${HF_TOKEN}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    # depends_on:
    #   - ollama
    logging:
      driver: "json-file"
      options:
        max-size: "${MAX_LOG_SIZE:-10m}"
        max-file: "${MAX_LOG_FILES:-3}"

volumes:
  # ============================================
  # DATA VOLUMES
  # Uncomment ollama_data if Ollama service is enabled
  # ============================================
  # ollama_data:
  #   driver: local
  
  openwebui-data:
    driver: local