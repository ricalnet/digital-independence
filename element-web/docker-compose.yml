services:
  element-web:
    image: vectorim/element-web:latest
    container_name: element-web
    restart: unless-stopped
    
    ports:
      - "127.0.0.1:8009:80"
    
    volumes:
      - ./config/element-web-config.json:/app/config.json:ro
      - ./modules:/modules:ro
    
    environment:
      - ELEMENT_WEB_PORT=80
      # - DEFAULT_SERVER_NAME=matrix.example.com
      # - DEFAULT_SERVER_URL=https://matrix.example.com
    
    # read_only: true
    # tmpfs:
    #   - /tmp
    #   - /etc/nginx/conf.d
    
    # deploy:
    #   resources:
    #     limits:
    #       memory: 256M
    #     reservations:
    #       memory: 128M
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    networks:
      - element-network

networks:
  element-network:
    driver: bridge
